<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Westies Pub Golf</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=IM+Fell+English:ital@0;1&family=Inter:wght@500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css?v=2" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <main class="loading-panel" aria-live="polite">
        <span class="loading-mark">☘</span>
        <p>Preparing the course...</p>
      </main>
    </div>

    <template id="app-template">
      <header class="topbar">
        <button class="icon-button" data-action="home" title="Back to start" aria-label="Back to start">←</button>
        <div>
          <p class="eyebrow">Live Pub Golf</p>
          <h1>Westies Pub Golf</h1>
          <p class="header-par">Team Par 72</p>
        </div>
        <button class="icon-button" data-action="share" title="Copy game link" aria-label="Copy game link">↗</button>
      </header>

      <section class="hero-band" data-view="home">
        <div class="hero-copy">
          <p class="eyebrow">The Official Unofficial Traditional Route</p>
          <h2>Westies Pub Golf</h2>
          <p class="hero-text">Enter your team name, tee off, and follow the live leaderboard as the round unfolds.</p>
        </div>
        <figure class="map-frame">
          <img src="./dublin-pub-golf-map.jpg" alt="Illustrated Dublin pub golf route map" />
        </figure>
      </section>

      <section class="panel start-panel" data-view="home">
        <div class="field-grid">
          <label>
            <span>Team Name</span>
            <input id="team-name" autocomplete="off" maxlength="32" placeholder="The Fairway Saints" />
          </label>
          <label>
            <span>Caddy Password</span>
            <input id="admin-password" type="password" autocomplete="off" maxlength="40" placeholder="For admin view" />
          </label>
        </div>
        <div class="button-row">
          <button class="primary-button" data-action="join-team">Tee Off</button>
          <button class="secondary-button" data-action="admin-login">Caddy Login</button>
        </div>
        <p class="status-line" id="connection-status"></p>
      </section>

      <section class="course-layout" data-view="scorecard" hidden>
        <aside class="score-summary">
          <p class="eyebrow">Current Team</p>
          <h2 id="active-team-name"></h2>
          <div class="total-ring">
            <span id="team-total">0</span>
            <small>Total</small>
          </div>
          <dl>
            <div>
              <dt>Game</dt>
              <dd id="summary-game-code"></dd>
            </div>
            <div>
              <dt>Par</dt>
              <dd id="summary-par"></dd>
            </div>
            <div>
              <dt>Vs Par</dt>
              <dd id="summary-vs-par"></dd>
            </div>
          </dl>
          <div class="side-leaderboard">
            <div class="side-heading">
              <p class="eyebrow">Live Leaderboard</p>
              <button class="mini-button" data-action="show-leaderboard">↗</button>
            </div>
            <div class="leaderboard compact" id="player-leaderboard"></div>
          </div>
        </aside>
        <div class="holes-list" id="holes-list"></div>
      </section>

      <section class="admin-layout" data-view="admin" hidden>
        <div class="admin-heading">
          <div>
            <p class="eyebrow">Caddy's Seal</p>
            <h2>Live Clubhouse</h2>
          </div>
          <button class="primary-button" data-action="refresh-admin">Refresh Scores</button>
        </div>
        <p class="admin-note">Oversee the game, watch live scores, and remove teams if needed.</p>
        <div class="leaderboard" id="admin-leaderboard"></div>
      </section>

      <dialog id="leaderboard-dialog">
        <div class="dialog-header">
          <div>
            <p class="eyebrow">Caddy's Seal</p>
            <h2>Leaderboard</h2>
          </div>
          <button class="icon-button" data-action="close-leaderboard" title="Close" aria-label="Close">×</button>
        </div>
        <div class="leaderboard" id="leaderboard"></div>
      </dialog>
    </template>

    <script src="./config.js?v=2"></script>
    <script type="module" src="./app.js?v=4"></script>
  </body>
</html>
